name: CI Main (Quality & Testing)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-and-tests:
    name: Quality (Lint, Types, Security, Tests)
    runs-on: ubuntu-latest

    services:
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff (Lint & Format)
        run: |
          python -m ruff check src/
          python -m ruff format src/ --check

      - name: Run Mypy (Types)
        env:
          PYTHONPATH: src/Hop-and-Barley
          DJANGO_SETTINGS_MODULE: core.settings.test
          SECRET_KEY: "ci_secret_key" # pragma: allowlist secret
        run: python -m mypy src/Hop-and-Barley

      - name: Security Audit (pip-audit)
        run: python -m pip_audit --local

      - name: Security SAST (Bandit)
        run: python -m bandit -r src/ -ll

      - name: Run Pytest
        env:
          SECRET_KEY: "test_secret_key_for_ci" # pragma: allowlist secret
          ENVIRONMENT: "testing"
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"
        run: python -m pytest

  build-check:
    name: Docker Build Check (Cached)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/backend/Dockerfile
          push: false
          tags: check-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend




      - name: Build Nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/nginx/Dockerfile
          push: false
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx
