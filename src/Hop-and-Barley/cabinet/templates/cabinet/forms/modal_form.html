{% load i18n %}
<div class="modal-header">
    <h5 class="modal-title">{% if object %}{% trans "Edit Product" %}{% else %}{% trans "Add Product" %}{% endif %}</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form method="post" action="{{ request.path }}" enctype="multipart/form-data" hx-post="{{ request.path }}" hx-target="#cabinet-modal-content">
    {% csrf_token %}
    <div class="modal-body">
        {% for field in form %}
            <div class="mb-3">
                <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small">{{ field.errors }}</div>
                {% endif %}
                {% if field.help_text %}
                    <div class="form-text text-muted small">{{ field.help_text }}</div>
                {% endif %}
            </div>
        {% endfor %}
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans "Cancel" %}</button>
        <button type="submit" class="btn btn-primary">{% trans "Save" %}</button>
    </div>
</form>
