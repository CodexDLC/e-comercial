services:
  db:
    image: postgres:16-alpine
    container_name: Hop-and-Barley_test-db
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=hop_and_barley_test_db
      - POSTGRES_USER=test_user
      - POSTGRES_PASSWORD=test_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d hop_and_barley_test_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - Hop-and-Barley_test-network

  redis:
    image: redis:7-alpine
    container_name: Hop-and-Barley_test-redis
    env_file:
      - ../.env
    command: >
      sh -c "redis-server --requirepass $${REDIS_PASSWORD} --appendonly yes"
    ports:
      - "6381:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=$${REDIS_PASSWORD} redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - Hop-and-Barley_test-network

  backend:
    build:
      context: ..
      dockerfile: deploy/backend/Dockerfile
    container_name: Hop-and-Barley_test-backend
    ports:
      - "8001:8000"
    env_file:
      - ../.env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=hop_and_barley_test_db
      - POSTGRES_USER=test_user
      - POSTGRES_PASSWORD=test_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - IS_DOCKER=True
      - ENVIRONMENT=testing
    volumes:
      - ../src/Hop-and-Barley:/app
      - media_test_volume:/app/media
      - static_test_volume:/app/staticfiles
      - logs_test_volume:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fL", "http://localhost:8000/api/v1/health/"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - Hop-and-Barley_test-network

volumes:
  postgres_test_data:
  redis_test_data:
  media_test_volume:
  static_test_volume:
  logs_test_volume:

networks:
  Hop-and-Barley_test-network:
    name: Hop-and-Barley_test-network
    driver: bridge
