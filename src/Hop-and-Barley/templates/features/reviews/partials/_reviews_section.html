{% load static %}
<section class="reviews-section" id="reviews-section">
  <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;">
    <h2 class="reviews-title">Latest reviews</h2>
    <span style="color:var(--grey-text); font-size:14px;">
      <i class="fa-solid fa-check" style="color:#4CAF50; margin-right:4px;"></i>You have already left a review
    </span>
  </div>

  <div class="reviews-grid">
    {% for review in reviews %}
    <div class="review-card">
      <div class="review-rating">
        {% for i in "12345"|make_list %}
          {% if forloop.counter <= review.rating %}
            <i class="fa-solid fa-star"></i>
          {% else %}
            <i class="fa-regular fa-star"></i>
          {% endif %}
        {% endfor %}
      </div>
      <div class="review-body">
        <p class="review-text">{{ review.comment }}</p>
      </div>
      <div class="review-author">
        <span class="author-name">{{ review.user.username }}</span>
      </div>
    </div>
    {% empty %}
        <p>No reviews yet.</p>
    {% endfor %}
  </div>
</section>
